<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطاقة قلب - Flip Card 16:9</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* ========== حاوية البطاقة الرئيسية ========== */
        .flip-card {
            width: 500px;      /* عرض البطاقة */
            /* العرض 500px، والارتفاع يحسب بنسبة 16:9 -> 500 / 16 * 9 = 281.25 */
            aspect-ratio: 16 / 9;  /* نسبة العرض إلى الارتفاع 16:9 */
            perspective: 1000px;    /* يعطي عمقاً للتأثير ثلاثي الأبعاد */
            cursor: pointer;
        }

        /* ========== الحاوية الداخلية التي ستقلب ========== */
        .activeCard {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s ease-in-out;
            transform-style: preserve-3d;
        }

        /* عند تمرير الماوس - قلب البطاقة */
        .flip-card:hover .activeCard {
            transform: rotateY(180deg);
        }

        /* ========== الوجه الأمامي والوجه الخلفي (مشتركين) ========== */
        .frontFace,
        .backFace {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;  /* يخفي الوجه الخلفي عندما يكون في الخلف */
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.3);
        }

        /* ========== الوجه الأمامي ========== */
        .frontFace {
            background-color: #f5f5f5;
            /* الصورة الأولى (الأمامية) */
            background-image: url('https://images.pexels.com/photos/1146708/pexels-photo-1146708.jpeg'); /* منظر طبيعي جميل */
            background-size: cover;
            background-position: center;
        }

        /* ========== الوجه الخلفي ========== */
        .backFace {
            background-color: #2c3e50;
            transform: rotateY(180deg);   /* يبدأ مقلباً حتى يكون جاهزاً للظهور */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
            /* الصورة الثانية (الخلفية) */
            background-image: url('https://images.pexels.com/photos/2080960/pexels-photo-2080960.jpeg'); /* منظر طبيعي آخر */
            background-size: cover;
            background-position: center;
            position: relative;
        }

        /* طبقة شفافة فوق الصورة الخلفية لتوضيح النص */
        .backFace::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        /* النص على الوجه الخلفي */
        .backFace h2,
        .backFace p {
            position: relative;
            z-index: 2;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .backFace h2 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .backFace p {
            font-size: 1.2rem;
        }

        /* ========== إضافة نص توضيحي على الوجه الأمامي ========== */
        .frontFace .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            padding: 20px;
            text-align: center;
            color: white;
            font-weight: bold;
        }

        /* ========== تجربة التصميم المتجاوب ========== */
        @media (max-width: 600px) {
            .flip-card {
                width: 90%;
            }
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="instruction">
            🃏 مرر الماوس على البطاقة لقلبها 🃏
        </div>  

        <div class="flip-card">
            <div class="activeCard">
                <!-- الوجه الأمامي (الصورة الأولى) -->
                <div class="frontFace">
                    <div class="overlay">
                        🌄 الصورة الأمامية
                    </div>
                </div>

                <!-- الوجه الخلفي (الصورة الثانية) -->
                <div class="backFace">
                    <h2>✨ الصورة الخلفية ✨</h2>
                    <p>لقد قلبت البطاقة!</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
